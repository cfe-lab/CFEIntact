
name: main

on: push

jobs:
  quicktest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 python3-pip ncbi-blast+ mafft

      - name: Run build
        run: pip3 install .[test]

      - name: Run tests and collect coverage
        run: pytest -v -m "not slow" --cov=./src

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  slowtest:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        testcase: ["tests/test_end_to_end.py::test_large", "tests/test_end_to_end.py::test_large_csv", "tests/test_end_to_end.py::test_large_hxb2"]

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 python3-pip ncbi-blast+ mafft

      - name: Run build
        run: pip3 install .[test]

      - name: Run tests and collect coverage
        run: pytest -v ${{ matrix.testcase }}

  installtest:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 python3-pip ncbi-blast+ mafft

      - name: Upgrade packaging support
        run: pip3 install --upgrade pip

      - name: Run build
        run: pip3 install .

      - name: Check installed version
        run: test "$(git describe --tags --abbrev=0)" == "v$(cfeintact version)"

      - name: Run test
        run: cfeintact check --subtype B tests/data-small.fasta && test -f "defects.csv"

  dockerinstall:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Needed for git tags.

      - name: Derive version from latest git tag
        id: gitver
        shell: bash
        run: |
          VERSION="$(git describe | sed 's/^v//')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/cfe-lab/cfeintact:${{ steps.gitver.outputs.version }}
            ghcr.io/cfe-lab/cfeintact:latest
          cache-from: type=gha,scope=docker-cfeintact
          cache-to: type=gha,mode=max,scope=docker-cfeintact

      - name: Run docker image entrypoint
        run: docker run ghcr.io/cfe-lab/cfeintact:latest --help

      - name: Run test
        run: |
          docker run --rm -v .:/w ghcr.io/cfe-lab/cfeintact check --subtype B "tests/data-small.fasta"
          test -f "defects.csv"

  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 python3-pip

      - name: Run build
        run: pip3 install .[dev]

      - name: Run linter
        run: flake8

  typechecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 python3-pip

      - name: Run build
        run: pip3 install .[dev]

      - name: Run typechecker
        run: mypy

  build-wasm:
    runs-on: ubuntu-latest
    needs: dockerinstall
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Derive version from latest git tag
        id: gitver
        shell: bash
        run: |
          VERSION="$(git describe | sed 's/^v//')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install container2wasm (c2w)
        run: |
          C2W_VERSION=0.8.3
          curl -fsSL \
            "https://github.com/ktock/container2wasm/releases/download/v${C2W_VERSION}/c2w_${C2W_VERSION}_linux_amd64.tar.gz" \
            | tar -xz c2w
          sudo install -m755 c2w /usr/local/bin/c2w
          c2w --version

      - name: Pull CFEIntact Docker image
        run: docker pull ghcr.io/cfe-lab/cfeintact:${{ steps.gitver.outputs.version }}

      - name: Convert Docker image to WebAssembly
        run: |
          mkdir -p wasm-app/public
          c2w --build-arg VM_MEMORY_SIZE_MB=1024 \
            ghcr.io/cfe-lab/cfeintact:${{ steps.gitver.outputs.version }} \
            wasm-app/public/cfeintact.wasm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: wasm-app/package-lock.json

      - name: Install npm dependencies
        working-directory: wasm-app
        run: npm ci

      - name: Build wasm app
        working-directory: wasm-app
        run: npm run build

      - name: Upload wasm app artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-app-dist
          path: wasm-app/dist/
          retention-days: 1

  build-docs:
    runs-on: ubuntu-latest
    needs: build-wasm
    if: github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        working-directory: docs
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Download wasm app
        uses: actions/download-artifact@v4
        with:
          name: wasm-app-dist
          path: docs/_site/app/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
